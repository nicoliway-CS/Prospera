# Streamlit configuration for Verify Me.
# [theme] gives the page a branded, trust-oriented look; [server] sets practical
# run defaults. Streamlit reads this automatically when launched from the repo root.

[theme]
primaryColor = "#2563eb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f5f9"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
